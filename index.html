<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0F0F0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>威力彩</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --red:    #D62828;
  --red2:   #8B1A1A;
  --gold:   #F5B700;
  --ink:    #0F0F0F;
  --paper:  #F5F3EE;
  --mist:   #E8E4DC;
  --smoke:  #7A756E;
  --white:  #FFFFFF;
  --blue:   #1A6BB5;
  --sans:   'Noto Sans TC', sans-serif;
  --mono:   'DM Mono', monospace;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: calc(64px + var(--safe-bottom));
  -webkit-font-smoothing: antialiased;
}

/* ══ TOP BAR ══ */
.topbar {
  background: var(--ink);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  height: 52px;
  position: sticky; top: 0; z-index: 200;
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo-badge {
  width: 30px; height: 30px;
  background: var(--red);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: #fff;
}
.logo-name { color: #fff; font-size: 17px; font-weight: 700; letter-spacing: 1px; }
.logo-sub { color: #666; font-size: 10px; font-family: var(--mono); display: block; }

/* jackpot badge in header */
.header-jp {
  background: linear-gradient(135deg,#FFF3CC,#FFE07A);
  border-radius: 20px; padding: 4px 10px;
  font-size: 11px; font-weight: 700; color: #7A5C00;
  white-space: nowrap;
}

/* ══ TICKER ══ */
.ticker {
  background: var(--red);
  padding: 7px 16px;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; overflow: hidden;
}
.ticker-lbl { color: rgba(255,255,255,.65); font-family: var(--mono); white-space: nowrap; font-size: 11px; }
.ticker-txt { color: #fff; white-space: nowrap; font-size: 12px; font-weight: 500; }

/* ══ MAIN ══ */
main { padding: 0 0 16px; }

/* ══ SECTION HEADER ══ */
.sh {
  display: flex; align-items: baseline; gap: 8px;
  padding: 20px 16px 12px;
}
.sh h2 { font-size: 18px; font-weight: 900; }
.sh span { font-size: 10px; font-family: var(--mono); color: var(--smoke); text-transform: uppercase; letter-spacing: .08em; }

/* ══ LATEST CARD ══ */
.latest-card {
  margin: 0 12px 20px;
  background: var(--white);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,.08);
}
.latest-card-top {
  background: linear-gradient(135deg, #1A0505, #3D0000);
  padding: 16px;
  position: relative;
}
.latest-card-top::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--red), var(--gold));
}
.lc-meta {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.lc-period-date { }
.lc-period { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.5); display: block; }
.lc-date { font-size: 13px; color: rgba(255,255,255,.85); font-weight: 500; }
.lc-jp-pill {
  background: rgba(245,183,0,.15);
  border: 1px solid rgba(245,183,0,.4);
  border-radius: 20px; padding: 4px 10px;
  font-size: 11px; font-weight: 700; color: var(--gold);
  white-space: nowrap;
}

/* ZONE SECTION */
.lc-zone { margin-bottom: 14px; }
.lc-zone-lbl {
  font-size: 10px; font-family: var(--mono); color: rgba(255,255,255,.4);
  letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px;
}
.balls-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* BALLS */
.ball {
  width: 46px; height: 46px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 16px; font-weight: 500;
  color: #fff;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.25);
  position: relative; user-select: none; flex-shrink: 0;
}
.ball::after {
  content: '';
  position: absolute; top: 7px; left: 10px;
  width: 10px; height: 6px;
  background: rgba(255,255,255,.32);
  border-radius: 50%;
}
.ball.z1 { background: radial-gradient(circle at 35% 35%, #f05050, #7A1010); }
.ball.z2 { background: radial-gradient(circle at 35% 35%, #4a9fe0, #0A3D7A); }

/* PRIZE TABLE inside card */
.lc-prizes {
  padding: 14px 16px;
}
.prize-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid var(--mist);
}
.prize-row:last-child { border-bottom: none; }
.prize-row.top-prize .pr-name { color: var(--red); font-weight: 700; }
.pr-name { font-size: 13px; font-weight: 500; color: var(--smoke); }
.pr-amount { font-size: 14px; font-weight: 700; color: var(--ink); }
.pr-amount.big { font-size: 17px; color: var(--red); }
.pr-hits { font-size: 11px; color: var(--smoke); margin-top: 1px; text-align: right; }
.pr-right { text-align: right; }
.no-win { font-size: 11px; color: var(--smoke); font-style: italic; }

/* ══ HISTORY CARDS ══ */
.hist-list { padding: 0 12px; display: flex; flex-direction: column; gap: 10px; }
.hist-card {
  background: var(--white);
  border-radius: 12px;
  padding: 14px 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
}
.hc-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.hc-period { font-family: var(--mono); font-size: 11px; color: var(--smoke); }
.hc-date { font-size: 12px; font-weight: 500; color: var(--ink); }
.hc-jp {
  font-size: 12px; font-weight: 700; color: var(--red);
  white-space: nowrap;
}
.hc-jp.nw { color: var(--smoke); font-weight: 400; font-style: italic; }
.mini-balls { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.mb {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; font-weight: 500; color: #fff;
  flex-shrink: 0;
}
.mb.z1 { background: var(--red); }
.mb.z2 { background: var(--blue); }
.mb-sep { color: var(--mist); font-size: 14px; margin: 0 1px; }

/* ══ SEARCH ══ */
.search-bar {
  padding: 0 12px 12px;
  display: flex; gap: 8px;
}
.search-bar input, .search-bar select {
  flex: 1; min-width: 0;
  border: 1.5px solid var(--mist);
  border-radius: 10px; padding: 10px 12px;
  font-family: var(--sans); font-size: 14px; color: var(--ink);
  background: var(--white);
  outline: none;
  -webkit-appearance: none;
}
.search-bar input:focus, .search-bar select:focus { border-color: var(--red); }
.search-bar button {
  background: var(--red); color: #fff;
  border: none; cursor: pointer;
  border-radius: 10px; padding: 10px 18px;
  font-family: var(--sans); font-size: 14px; font-weight: 700;
  white-space: nowrap;
}

/* ══ LOAD MORE ══ */
.load-more-wrap { text-align: center; padding: 16px; }
.load-more-btn {
  background: var(--ink); color: #fff;
  border: none; cursor: pointer;
  border-radius: 10px; padding: 12px 32px;
  font-family: var(--sans); font-size: 14px; font-weight: 700;
  width: 100%; max-width: 280px;
}

/* ══ STATS ══ */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 0 12px 4px;
}
.stat-card {
  background: var(--white);
  border-radius: 12px; padding: 14px 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
}
.stat-lbl { font-size: 10px; font-family: var(--mono); color: var(--smoke); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.stat-val { font-size: 24px; font-weight: 900; font-family: var(--mono); color: var(--ink); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--smoke); margin-top: 4px; }

/* FREQ */
.freq-wrap {
  margin: 0 12px;
  background: var(--white);
  border-radius: 12px; padding: 16px 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.freq-inner { display: flex; gap: 6px; min-width: max-content; }
.freq-item { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 36px; }
.freq-num { font-family: var(--mono); font-size: 10px; color: var(--ink); font-weight: 500; }
.freq-bar-wrap { width: 20px; height: 52px; background: var(--mist); border-radius: 3px; display: flex; align-items: flex-end; overflow: hidden; }
.freq-bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--red); }
.freq-bar.b2 { background: var(--blue); }
.freq-ct { font-family: var(--mono); font-size: 9px; color: var(--smoke); }

/* JACKPOT CHART */
.chart-wrap {
  margin: 0 12px;
  background: var(--white);
  border-radius: 12px; padding: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.chart-wrap canvas { display: block; }

/* ══ LOADER ══ */
.loading {
  text-align: center; padding: 40px 16px;
  color: var(--smoke); font-size: 14px;
}
.spinner {
  width: 26px; height: 26px;
  border: 3px solid var(--mist); border-top-color: var(--red);
  border-radius: 50%; animation: spin .7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ BOTTOM NAV ══ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 200;
  border-top: 1px solid #222;
}
.bnav-btn {
  flex: 1; background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 0 8px;
  color: #666; font-family: var(--sans); font-size: 10px;
  transition: color .15s;
}
.bnav-btn svg { width: 22px; height: 22px; }
.bnav-btn.active { color: var(--gold); }
.bnav-btn:active { opacity: .7; }

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* INFO PILL */
.info-pill {
  margin: 0 12px 16px;
  background: var(--ink); color: rgba(255,255,255,.55);
  border-radius: 10px; padding: 12px 14px;
  font-size: 11.5px; line-height: 1.9;
}
.info-pill strong { color: var(--gold); }

footer {
  padding: 16px;
  font-size: 11px; color: var(--smoke); text-align: center; line-height: 1.8;
}
footer a { color: var(--smoke); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-badge">威</div>
    <div>
      <span class="logo-name">威力彩</span>

</div>

<main>

  <!-- ══ 最新開獎 ══ -->
  <div class="view active" id="view-latest">

        <div class="lc-zone">
          <div class="lc-zone-lbl">第一區（01–38）</div>

      </div>

    <div class="sh" style="margin-top:4px"><h2>近期開獎</h2><span>最近 10 期</span></div>

  <div class="view" id="view-history">

      <input id="s-period" type="number" inputmode="numeric" placeholder="搜尋期別">
      <select id="s-year">
        <option value="">全部</option>

  <!-- ══ 統計分析 ══ -->
  <div class="view" id="view-stats">
    <div class="sh"><h2>統計分析</h2><span>近 50 期</span></div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-lbl">最長連槓</div>
        <div class="stat-val" id="s-streak">—</div>

      </div>

        <div class="stat-lbl">頭獎開出率</div>
        <div class="stat-val" id="s-rate">—</div>

      </div>
      <div class="stat-card">
        <div class="stat-lbl">平均頭獎</div>
        <div class="stat-val" id="s-avg">—</div>
        <div class="stat-sub">億元（有開出期）</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">目前累積</div>
        <div class="stat-val" id="s-cur">—</div>
        <div class="stat-sub">億元</div>

    <div class="sh" style="margin-top:16px"><h2>第一區出現頻率</h2><span>近 50 期 — 左右滑動</span></div>
    <div class="freq-wrap"><div class="freq-inner" id="freq-z1"></div></div>

    <div class="sh" style="margin-top:16px"><h2>第二區出現頻率</h2><span>近 50 期</span></div>
    <div class="freq-wrap"><div class="freq-inner" id="freq-z2"></div></div>

    <div class="sh" style="margin-top:16px"><h2>頭獎累積走勢</h2><span>近 30 期</span></div>
    <div class="chart-wrap"><canvas id="jp-canvas" height="180"></canvas></div>
  </div>

</main>

<footer>
  資料僅供參考，以<a href="https://www.taiwanlottery.com" target="_blank">台灣彩券官網</a>為準<br>

<nav class="bottom-nav">
  <button class="bnav-btn active" id="bnav-latest" onclick="switchView('latest',this)">

    </svg>

<script>
// ─── DEMO DATA ─────────────────────────────────────────────
const DRAWS = generateData();

function generateData() {
  const base = new Date('2026-06-23');
  const draws = [];
  let period = 115000051;
  let jp = 200000000;
  const rnd = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
  const pick6 = () => {
    const pool=[...Array(38)].map((_,i)=>i+1), r=[];
    for(let i=0;i<6;i++){const j=rnd(0,pool.length-1);r.push(pool.splice(j,1)[0]);}
    return r.sort((a,b)=>a-b);
  };
  for(let i=0;i<60;i++){
    const d=new Date(base);
    d.setDate(base.getDate()-Math.floor(i/2)*7-(i%2===0?0:3));
    const z1=pick6(), z2=rnd(1,8);
    const hit = Math.random()<0.28;
    const cnt = hit?rnd(1,3):0;
    const thisjp = hit?jp:0;
    if(hit) jp=200000000+rnd(0,4)*100000000; else jp+=rnd(1,4)*100000000;
    if(jp>2800000000)jp=200000000;
    draws.push({
      period:period-i, date:d.toISOString().split('T')[0],
      z1,z2,jackpot:thisjp||jp,accumulated:!hit,
      w1cnt:cnt,
      prizes:{
        壹獎:{amount:thisjp||jp,count:cnt},
        貳獎:{amount:3000000,count:rnd(0,4)},
        參獎:{amount:300000,count:rnd(0,18)},
        肆獎:{amount:30000,count:rnd(3,40)},
        伍獎:{amount:3000,count:rnd(20,180)},
        陸獎:{amount:300,count:rnd(80,700)},
        柒獎:{amount:300,count:rnd(150,1200)},
        捌獎:{amount:300,count:rnd(400,2500)},
        玖獎:{amount:300,count:rnd(400,2500)},
        普獎:{amount:100,count:rnd(1500,12000)},
      }
    });
  }
  return draws;
}

// ─── UTILS ────────────────────────────────────────────────
const pad2 = n => String(n).padStart(2,'0');
const weekdays = ['日','一','二','三','四','五','六'];
function fmtDate(s){
  const d=new Date(s);
  return `${d.getFullYear()-1911}/${pad2(d.getMonth()+1)}/${pad2(d.getDate())} 週${weekdays[d.getDay()]}`;
}
function fmtMoney(n){
  if(n>=1e8) return (n/1e8).toFixed(2)+'億';
  if(n>=1e4) return (n/1e4).toFixed(0)+'萬';
  return n.toLocaleString()+'元';
}
function makeBall(n,cls){
  return `<div class="ball ${cls}">${pad2(n)}</div>`;
}
function makeMB(n,cls){
  return `<div class="mb ${cls}">${pad2(n)}</div>`;
}

// ─── RENDER LATEST ────────────────────────────────────────
function renderLatest(){
  const d=DRAWS[0];
  document.getElementById('header-jp').textContent=
    (d.accumulated?'累積 ':'')+fmtMoney(d.jackpot);
  document.getElementById('lv-period').textContent=`第 ${d.period} 期`;
  document.getElementById('lv-loading').style.display='none';
  document.getElementById('lv-card').style.display='block';

  document.getElementById('lc-period').textContent=`第 ${d.period} 期`;
  document.getElementById('lc-date').textContent=fmtDate(d.date);
  document.getElementById('lc-jp-pill').textContent=
    (d.accumulated?'累積 ':'')+fmtMoney(d.jackpot);

  document.getElementById('lc-z1').innerHTML=d.z1.map(n=>makeBall(n,'z1')).join('');
  document.getElementById('lc-z2').innerHTML=makeBall(d.z2,'z2');

  const prizeOrder=['壹獎','貳獎','參獎','肆獎','伍獎','陸獎','柒獎','捌獎','玖獎','普獎'];
  document.getElementById('lc-prizes').innerHTML=prizeOrder.map(k=>{
    const v=d.prizes[k]; if(!v)return'';
    const big=k==='壹獎'?' big':'';
    const top=k==='壹獎'?' top-prize':'';
    return `<div class="prize-row${top}">
      <span class="pr-name">${k}</span>
      <div class="pr-right">
        <div class="pr-amount${big}">${fmtMoney(v.amount)}</div>
        <div class="pr-hits">${v.count>0?v.count+' 注中獎':'<span class="no-win">本期槓龜</span>'}</div>
      </div>
    </div>`;
  }).join('');
}

// ─── RENDER RECENT ─────────────────────────────────────────
function renderRecent(){
  document.getElementById('rc-loading').style.display='none';
  document.getElementById('rc-list').style.display='flex';
  document.getElementById('rc-list').innerHTML=DRAWS.slice(0,10).map(histCard).join('');
}

function histCard(d){
  const jp=d.prizes.壹獎;
  return `<div class="hist-card">
    <div class="hc-top">
      <div>
        <div class="hc-period">${d.period}</div>
        <div class="hc-date">${fmtDate(d.date)}</div>
      </div>
      <div class="hc-jp ${jp.count===0?'nw':''}">
        ${jp.count>0?fmtMoney(jp.amount)+' × '+jp.count+'注':'槓龜'}
      </div>
    </div>
    <div class="mini-balls">
      ${d.z1.map(n=>makeMB(n,'z1')).join('')}
      <span class="mb-sep">|</span>
      ${makeMB(d.z2,'z2')}
    </div>
  </div>`;
}

// ─── HISTORY ──────────────────────────────────────────────
let filtered=[...DRAWS], histPage=0;
const PAGE=15;

function renderHistPage(){
  const slice=filtered.slice(histPage*PAGE,(histPage+1)*PAGE);
  const list=document.getElementById('ht-list');
  if(histPage===0) list.innerHTML='';
  list.innerHTML+=slice.map(histCard).join('');
  document.getElementById('ht-loading').style.display='none';
  list.style.display='flex';
  document.getElementById('ht-more').style.display=
    ((histPage+1)*PAGE<filtered.length)?'block':'none';
}

function filterHist(){
  const p=document.getElementById('s-period').value.trim();
  const y=document.getElementById('s-year').value;
  filtered=DRAWS.filter(d=>{
    if(p&&!String(d.period).includes(p))return false;
    if(y&&!String(d.period).startsWith(y))return false;
    return true;
  });
  histPage=0; renderHistPage();
}
function loadMore(){ histPage++; renderHistPage(); }

// ─── STATS ────────────────────────────────────────────────
function renderStats(){
  const data=DRAWS.slice(0,50);
  let mx=0,cur=0;
  data.forEach(d=>{ if(d.prizes.壹獎.count===0){cur++;mx=Math.max(mx,cur);}else cur=0; });
  document.getElementById('s-streak').textContent=mx;
  const wins=data.filter(d=>d.prizes.壹獎.count>0);
  document.getElementById('s-rate').textContent=Math.round(wins.length/data.length*100)+'%';
  const avg=wins.length?wins.reduce((s,d)=>s+d.prizes.壹獎.amount,0)/wins.length:0;
  document.getElementById('s-avg').textContent=(avg/1e8).toFixed(1);
  document.getElementById('s-cur').textContent=(DRAWS[0].jackpot/1e8).toFixed(2);

  // Z1 freq
  const f1={};for(let i=1;i<=38;i++)f1[i]=0;
  data.forEach(d=>d.z1.forEach(n=>f1[n]++));
  const mx1=Math.max(...Object.values(f1));
  document.getElementById('freq-z1').innerHTML=Object.entries(f1).map(([n,c])=>`
    <div class="freq-item">
      <div class="freq-num">${pad2(+n)}</div>
      <div class="freq-bar-wrap"><div class="freq-bar" style="height:${Math.round(c/mx1*46)+4}px"></div></div>
      <div class="freq-ct">${c}</div>
    </div>`).join('');

  // Z2 freq
  const f2={};for(let i=1;i<=8;i++)f2[i]=0;
  data.forEach(d=>f2[d.z2]++);
  const mx2=Math.max(...Object.values(f2));
  document.getElementById('freq-z2').innerHTML=Object.entries(f2).map(([n,c])=>`
    <div class="freq-item">
      <div class="freq-num">${pad2(+n)}</div>
      <div class="freq-bar-wrap"><div class="freq-bar b2" style="height:${Math.round(c/mx2*46)+4}px"></div></div>
      <div class="freq-ct">${c}</div>
    </div>`).join('');

  drawChart(data.slice(0,30).reverse());
}

function drawChart(draws){
  const wrap=document.getElementById('jp-canvas').parentElement;
  const W=Math.max(wrap.clientWidth-28, 280);
  const H=180;
  const c=document.getElementById('jp-canvas');
  c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  const jps=draws.map(d=>d.jackpot);
  const maxJ=Math.max(...jps), minJ=Math.min(...jps);
  const p={t:20,r:12,b:28,l:52};
  const cw=W-p.l-p.r, ch=H-p.t-p.b;

  // grid
  ctx.strokeStyle='#E8E4DC'; ctx.lineWidth=1;
  for(let g=0;g<=4;g++){
    const y=p.t+ch*(1-g/4);
    ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke();
    ctx.fillStyle='#999';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';
    ctx.fillText(((minJ+(maxJ-minJ)*g/4)/1e8).toFixed(1)+'億',p.l-4,y+3);
  }
  // fill
  const grad=ctx.createLinearGradient(0,p.t,0,p.t+ch);
  grad.addColorStop(0,'rgba(214,40,40,.15)');grad.addColorStop(1,'rgba(214,40,40,0)');
  ctx.beginPath();
  draws.forEach((d,i)=>{
    const x=p.l+(i/(draws.length-1))*cw;
    const y=p.t+ch*(1-(d.jackpot-minJ)/(maxJ-minJ+1));
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.lineTo(p.l+cw,p.t+ch);ctx.lineTo(p.l,p.t+ch);
  ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // line
  ctx.beginPath();ctx.strokeStyle='#D62828';ctx.lineWidth=2;
  ctx.lineJoin='round';ctx.lineCap='round';
  draws.forEach((d,i)=>{
    const x=p.l+(i/(draws.length-1))*cw;
    const y=p.t+ch*(1-(d.jackpot-minJ)/(maxJ-minJ+1));
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // dots
  draws.forEach((d,i)=>{
    const x=p.l+(i/(draws.length-1))*cw;
    const y=p.t+ch*(1-(d.jackpot-minJ)/(maxJ-minJ+1));
    ctx.beginPath();ctx.arc(x,y,d.prizes.壹獎.count>0?5:3,0,Math.PI*2);
    ctx.fillStyle=d.prizes.壹獎.count>0?'#F5B700':'#D62828';
    ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  });
  // x labels
  ctx.fillStyle='#999';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';
  draws.forEach((d,i)=>{
    if(i%5===0){
      const x=p.l+(i/(draws.length-1))*cw;
      ctx.fillText(String(d.period).slice(-4),x,H-6);
    }
  });
  // legend
  ctx.beginPath();ctx.arc(W-76,H-8,4,0,Math.PI*2);ctx.fillStyle='#F5B700';ctx.fill();
  ctx.fillStyle='#999';ctx.textAlign='left';ctx.font='9px DM Mono,monospace';
  ctx.fillText('= 有頭獎',W-69,H-4);
}

// ─── NAVIGATION ───────────────────────────────────────────
function switchView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='history'){filtered=[...DRAWS];histPage=0;renderHistPage();}
  if(id==='stats') renderStats();
}
